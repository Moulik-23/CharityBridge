<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NGO Login - CharityBridge</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="bg-light-color text-text-dark">
    <!-- Header -->
    <header class="bg-white shadow-md py-4 px-6">
      <div class="container mx-auto flex justify-between items-center">
        <div>
          <a href="../index.html" class="text-3xl font-bold text-primary-color"
            >CharityBridge</a
          >
        </div>
        <nav class="hidden md:flex space-x-6 items-center">
          <a href="../index.html" class="text-gray-300 hover:text-primary-color"
            >Home</a
          >
          <a href="../login.html" class="text-gray-300 hover:text-primary-color"
            >Login</a
          >
          <a href="../register.html" class="btn btn-primary">Register</a>
        </nav>
      </div>
    </header>

    <!-- Login Form -->
    <section class="py-16">
      <div class="container mx-auto px-6">
        <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-10">
          <h2 class="text-4xl font-bold text-center mb-12 text-primary-color">
            NGO Login
          </h2>

          <!-- ✅ Connects to backend -->
          <form action="backend/ngo_login.php" method="POST">
            <!-- Email -->
            <div class="mb-4">
              <label
                for="email"
                class="block text-gray-700 text-sm font-bold mb-2"
                >Email Address</label
              >
              <div class="relative">
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-700 focus:outline-none focus:ring-2 focus:ring-primary-color focus:border-transparent"
                  placeholder="ngo@example.com"
                  required
                />
              </div>
            </div>

            <!-- Password -->
            <div class="mb-6">
              <label
                for="password"
                class="block text-gray-700 text-sm font-bold mb-2"
                >Password</label
              >
              <div class="relative">
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-700 focus:outline-none focus:ring-2 focus:ring-primary-color focus:border-transparent"
                  placeholder="••••••••"
                  required
                />
              </div>
            </div>

            <!-- Submit -->
            <div class="mt-6">
              <button
                type="submit"
                class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-300 ease-in-out"
              >
                Login
              </button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark-color text-white py-12">
      <div class="container mx-auto text-center">
        <p>&copy; 2025 CharityBridge. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
