<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Profile - CharityBridge</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="bg-light-color text-text-dark">

<!-- Header -->
<header class="bg-white shadow-md py-4 px-6">
  <div class="container mx-auto flex justify-between items-center">
    <div>
      <a href="dashboard.php" class="text-3xl font-bold text-primary-color">CharityBridge</a>
    </div>
    <div class="flex items-center">
      <nav class="hidden md:flex">
        <a href="dashboard.php" class="text-primary-color hover:text-secondary-color px-3 py-2">Dashboard</a>
        <a href="requirements.php" class="text-primary-color hover:text-secondary-color px-3 py-2">Post Requirement</a>
        <a href="donations.php" class="text-primary-color hover:text-secondary-color px-3 py-2">Manage Donations</a>
        <a href="volunteers.php" class="text-primary-color hover:text-secondary-color px-3 py-2">Volunteers</a>
        <a href="manage_profile.html" class="text-primary-color hover:text-secondary-color px-3 py-2">Manage Profile</a>
        <a href="../backend/logout.php" id="logoutBtn" class="px-3 py-2 text-red-500 font-semibold">Logout</a>
      </nav>
    </div>
  </div>
</header>

<!-- Main -->
<main class="py-16">
  <div class="container mx-auto px-6">
    <h1 class="text-4xl font-bold mb-8 text-primary-color">Manage Your Profile</h1>

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-2xl mx-auto">
      <form action="../backend/update_profile.php" method="POST" enctype="multipart/form-data">
        <div class="mb-6">
          <label for="name" class="block text-gray-700 text-lg font-semibold mb-2">NGO Name</label>
          <input type="text" id="name" name="name" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-color" required>
        </div>
        <div class="mb-6">
          <label for="ngo_type" class="block text-gray-700 text-lg font-semibold mb-2">NGO Type</label>
          <input type="text" id="ngo_type" name="ngo_type" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-color" required>
        </div>
        <div class="mb-6">
          <label for="address" class="block text-gray-700 text-lg font-semibold mb-2">Address</label>
          <textarea id="address" name="address" rows="4" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-color" required></textarea>
        </div>
        <div class="mb-6">
          <label for="qr_code" class="block text-gray-700 text-lg font-semibold mb-2">Upload New QR Code (Optional)</label>
          <input type="file" id="qr_code" name="qr_code" accept="image/*" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-color">
          <p class="text-sm text-gray-500 mt-2">Current QR Code: <span id="current-qr-code">None</span></p>
        </div>
        <button type="submit" class="btn btn-primary w-full">Update Profile</button>
      </form>
    </div>
  </div>
</main>

<!-- Footer -->
<footer class="bg-dark-color text-white py-12 mt-16">
  <div class="container mx-auto text-center">
    <p>&copy; 2025 CharityBridge. All rights reserved.</p>
  </div>
</footer>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const logoutBtn = document.getElementById("logoutBtn");
  if (logoutBtn) {
    logoutBtn.addEventListener("click", function(event) {
      if (!confirm("Are you sure you want to logout?")) {
        event.preventDefault();
      }
    });
  }

  // Fetch NGO profile data and populate the form
  fetch('../backend/get_profile.php') // You'll need to create this endpoint
    .then(response => response.json())
    .then(data => {
      if (data.success) {
        document.getElementById('name').value = data.ngo.name;
        document.getElementById('ngo_type').value = data.ngo.ngo_type;
        document.getElementById('address').value = data.ngo.address;
        if (data.ngo.qr_code_image) {
          document.getElementById('current-qr-code').textContent = data.ngo.qr_code_image;
        }
      } else {
        console.error('Error fetching profile:', data.error);
      }
    })
    .catch(error => console.error('Network error:', error));
});
</script>
</body>
</html>
