<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Management - CharityBridge</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-white shadow">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div>
                    <a href="../index.html" class="text-2xl font-bold text-gray-800">CharityBridge - Admin</a>
                </div>
                <div class="flex items-center">
                    <nav class="hidden md:flex">
                        <a href="dashboard.html" class="text-gray-800 hover:text-blue-500 px-3 py-2">Dashboard</a>
                        <a href="approvals.html" class="text-gray-800 hover:text-blue-500 px-3 py-2">Approvals</a>
                        <a href="fraud.html" class="text-gray-800 hover:text-blue-500 px-3 py-2">Fraud Management</a>
                        <a href="content.html" class="text-gray-800 hover:text-blue-500 px-3 py-2">Content</a>
                        <a href="../index.html" class="text-gray-800 hover:text-blue-500 px-3 py-2">Logout</a>
                    </nav>
                    <button class="md:hidden" id="mobile-menu-button">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile Menu -->
        <div class="md:hidden hidden" id="mobile-menu">
            <a href="dashboard.html" class="block py-2 px-4 text-sm hover:bg-gray-200">Dashboard</a>
            <a href="approvals.html" class="block py-2 px-4 text-sm hover:bg-gray-200">Approvals</a>
            <a href="fraud.html" class="block py-2 px-4 text-sm hover:bg-gray-200">Fraud Management</a>
            <a href="content.html" class="block py-2 px-4 text-sm hover:bg-gray-200">Content</a>
            <a href="../index.html" class="block py-2 px-4 text-sm hover:bg-gray-200">Logout</a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="py-16">
        <div class="container mx-auto px-6">
            <h1 class="text-4xl font-bold mb-8">Content Management</h1>
            <div class="bg-white p-8 rounded-lg shadow-md">
                <h2 class="text-2xl font-bold mb-6">Edit Homepage Content</h2>
                <form>
                    <div class="mb-4">
                        <label for="hero-title" class="block text-gray-700 text-sm font-bold mb-2">Hero Title</label>
                        <input type="text" id="hero-title" name="hero-title" class="w-full px-3 py-2 border rounded-lg text-gray-700 focus:outline-none focus:border-blue-500" value="Connecting Hearts, Changing Lives">
                    </div>
                    <div class="mb-4">
                        <label for="hero-subtitle" class="block text-gray-700 text-sm font-bold mb-2">Hero Subtitle</label>
                        <textarea id="hero-subtitle" name="hero-subtitle" rows="3" class="w-full px-3 py-2 border rounded-lg text-gray-700 focus:outline-none focus:border-blue-500">Join our community to make a difference. We bridge the gap between those who want to help and those who need it.</textarea>
                    </div>
                    <button type="submit" class="bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 btn btn-primary">
                        Save Changes
                    </button>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8">
        <div class="container mx-auto text-center">
            <p>&copy; 2025 CharityBridge. All rights reserved.</p>
        </div>
    </footer>

    <script src="../js/script.js"></script>
</body>
</html>
